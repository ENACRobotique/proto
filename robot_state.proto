syntax = "proto3";

package enac;

import public "common.proto";

message no_args_func_ {
    float nothing = 1;
}

message Aruco {
    float x = 1;
    float y = 2;
    float z = 3;
    float ArucoId = 5;
    float qx = 8;
    float qy = 9;
    float qz = 10;
    float qw = 11;
}

message Arucos {
    repeated Aruco arucos = 1;
    string cameraName = 2;
}

message IO {
    int32 id = 1;
    int32 val = 2;
}


message LCDOut {
    string line1 = 1;
    string line2 = 2;
    bool red = 3;
    bool green = 4;
    bool blue = 5;
    int32 buzzer = 6;
}

message LCDState {
    int32 ok = 1;
    int32 ret = 2;
    int32 color = 3;
    int32 tirette = 4;
    int32 potar = 5;
}

message LCDEvent {
    enum Button {
        OK = 0;
        RET = 1;
        COLOR = 2;
        TIRETTE = 3;
        POTAR = 4;
    }
    Button button = 1;
    int32 value = 2;
}

message Score {
    int32 score = 1;
}


message Side {
    enum Color {
        BLUE = 0;
        YELLOW = 1;
    }
    Color color = 1;
}

message Tirette {
    enum TiretteState {
        IN = 0;
        OUT = 1;
    }
    TiretteState tirette_state = 1;
}
